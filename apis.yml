aid: runbooks
name: Runbooks
description: >-
  Runbooks is an all-in-one IT operations platform purpose-built for IT teams and managed
  service providers. It consolidates ITSM, ITAM, BizOps, SecOps, and Insights into a
  single integrated system, enabling teams to manage help desk tickets, hardware and software
  assets, client relationships, security audits, and operational analytics from one platform.
  Runbooks targets IT departments and MSPs managing 50-5,000 users at a flat-rate pricing model.
