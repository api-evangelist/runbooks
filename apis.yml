aid: runbooks
name: Runbooks
description: >-
  Runbooks is an all-in-one IT operations platform purpose-built for IT teams and managed
  service providers (MSPs). It consolidates ITSM (service desk, ticketing, incident management,
  knowledge base, SLA management), ITAM (hardware and software asset tracking, lifecycle
  management, warranty tracking, QR code asset labels), BizOps (CRM, client management,
  quarterly business reviews, budget forecasting, vendor management), SecOps (audit logs,
  MFA, password management), and Insights (automated reports, satisfaction tracking,
  quality assurance, KPI analytics) into a single integrated system. The platform targets
  IT departments and MSPs managing 50-5,000 users at a flat $25 per tech per month
  pricing model with no tiers or hidden fees. Runbooks is SOC 2 compliant with 99.9% uptime.
